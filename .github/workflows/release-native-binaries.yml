name: Build native executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_suffix: linux-amd64
            exe_ext: ''
          - os: macos-13
            asset_suffix: macos-amd64
            exe_ext: ''
          - os: windows-2022
            asset_suffix: windows-amd64
            exe_ext: '.exe'

    env:
      RUBY_VERSION: '3.4.3'
      TEBAKO_PREFIX: ${{ github.workspace }}/../.tebako-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Cache Tebako environment
        uses: actions/cache@v4
        with:
          path: ${{ env.TEBAKO_PREFIX }}
          key: ${{ runner.os }}-tebako-${{ env.RUBY_VERSION }}-${{ hashFiles('**/Gemfile', '**/*.gemspec') }}
          restore-keys: |
            ${{ runner.os }}-tebako-${{ env.RUBY_VERSION }}-

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          mkdir -p ../dist
          docker run --rm -v ${{ github.workspace }}:/mnt/w -v ${{ github.workspace }}/../dist:/mnt/d -t ghcr.io/tamatebako/tebako-ubuntu-20.04:latest \
            tebako press \
            --root=/mnt/w \
            --entry-point=bin/wayback_machine_downloader \
            --output=/mnt/d/wayback_machine_downloader-${{ matrix.asset_suffix }}${{ matrix.exe_ext }} \
            --Ruby=${{ env.RUBY_VERSION }} \
            --patchelf
          echo "ASSET_PATH=${{ github.workspace }}/../dist/wayback_machine_downloader-${{ matrix.asset_suffix }}${{ matrix.exe_ext }}" >> $GITHUB_ENV

      - name: Setup Ruby (macOS)
        if: matrix.os == 'macos-13'
        uses: ruby/setup-ruby@v1.305.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install macOS dependencies & Tebako
        if: matrix.os == 'macos-13'
        run: |
          brew install cmake bison
          gem install tebako --no-document

      - name: Build executable (macOS)
        if: matrix.os == 'macos-13'
        run: |
          mkdir -p ../dist
          tebako press \
            --root=. \
            --entry-point=bin/wayback_machine_downloader \
            --output=../dist/wayback_machine_downloader-${{ matrix.asset_suffix }}${{ matrix.exe_ext }} \
            --Ruby=${{ env.RUBY_VERSION }}
          echo "ASSET_PATH=${{ github.workspace }}/../dist/wayback_machine_downloader-${{ matrix.asset_suffix }}${{ matrix.exe_ext }}" >> $GITHUB_ENV

      - name: Setup Ruby & MSYS2 (Windows)
        if: matrix.os == 'windows-2022'
        uses: ruby/setup-ruby@v1.305.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Build executable (Windows)
        if: matrix.os == 'windows-2022'
        shell: cmd
        run: |
          :: Set up the MinGW/UCRT64 build toolchain
          call ridk enable ucrt64
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-toolchain

          :: Install Tebako
          gem install tebako --no-document

          :: Create safe outside dist folder
          mkdir ..\dist

          :: Press the executable
          tebako press ^
            --root=. ^
            --entry-point=bin/wayback_machine_downloader ^
            --output=..\dist\wayback_machine_downloader-${{ matrix.asset_suffix }}${{ matrix.exe_ext }} ^
            --Ruby=%RUBY_VERSION%

      - name: Set asset path (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          "ASSET_PATH=${{ github.workspace }}\..\dist\wayback_machine_downloader-${{ matrix.asset_suffix }}${{ matrix.exe_ext }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayback-machine-downloader-${{ matrix.asset_suffix }}
          path: ${{ env.ASSET_PATH }}

  release:
    name: Publish release assets
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show generated assets
        run: ls -lah release-assets

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
